name: CI/CD

on:
  push:
    branches: [main, "feature/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-backend:
    name: Test backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: sqlite:///ci.sqlite3
      APP_DEBUG: "True"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check Django configuration
        run: python manage.py check

      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: python manage.py test --noinput

  package:
    name: Package application
    needs: test-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release artifact
        run: |
          mkdir -p release
          tar --exclude='.git' --exclude='.venv' --exclude='__pycache__' \
            --exclude='backend/media' --exclude='backend/storage' \
            -czf release/ai-devsecops-platform.tar.gz .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-devsecops-platform
          path: release/ai-devsecops-platform.tar.gz
