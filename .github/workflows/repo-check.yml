name: Repository Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  repo-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f README.md
          test -f .env.example
          test -f docs/architecture.md
          test -f docs/development-plan.md
          test -f docs/github-workflow.md

      - name: Print repository status
        run: |
          echo "Repository bootstrap files are present."
